# REVIEW #3: ${user.dir} path resolution is fragile — only works when jar is launched from server/ directory
server:
  port: 8443
  ssl:
    enabled: true
    key-store: file:${user.dir}/../certs/server-keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12
    trust-store: file:${user.dir}/../certs/server-truststore.p12
    trust-store-password: changeit
    trust-store-type: PKCS12
    client-auth: need  # Requires client to present a valid certificate

spring:
  application:
    name: mtls-server
